name: Deploy Java Clue Backend

on:
  push:
    branches: [ "main" ] 

jobs:
  deploy:
    runs-on: self-hosted 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t clue-backend .

    - name: Stop Old Container
      run: docker stop backend-container || true

    - name: Remove Old Container
      run: docker rm backend-container || true

    - name: Run New Container
      # Connects to the clue-network and reads your local .env file
      run: docker run -d -p 8080:8080 --name backend-container --network clue-network --env-file ~/backend.env clue-backend
