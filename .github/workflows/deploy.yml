name: Deploy Java Quiz Backend

on:
  push:
    branches: [ "main" ] 

jobs:
  deploy:
    runs-on: self-hosted 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy with Docker Compose
      # This single command stops old containers, rebuilds the Java image, and starts both the DB and Backend
      run: sudo docker compose up -d --build
