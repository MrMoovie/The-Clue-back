version: '3.8'

services:
  # 1. The Database Container
  mysql-db:
    image: mysql:8.0
    container_name: quiz-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: supersecretrootpassword
      MYSQL_DATABASE: quizdb
      MYSQL_USER: quizuser
      MYSQL_PASSWORD: quizpassword
    # This saves your database data so it isn't lost when the container restarts
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Your Java Backend Container
  backend:
    build: .
    container_name: backend-container
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Spring Boot looks for these specific environment variables by default
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/quizdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: quizuser
      SPRING_DATASOURCE_PASSWORD: quizpassword
    depends_on:
      - mysql-db # Tells Docker to start the database before the backend

volumes:
  mysql_data:
